<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - MedicPulse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .appointments-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            overflow-x: auto;
        }

        .appointments-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0;
            background: white;
        }

        .appointments-table th,
        .appointments-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }

        .appointments-table th {
            background-color: var(--primary-color, #0056b3);
            color: white;
            font-weight: 500;
        }

        .appointments-table tr:last-child td {
            border-bottom: none;
        }

        .appointments-table tr:hover {
            background-color: #f9f9f9;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
        }

        .status-confirmed {
            background-color: #e6f4ea;
            color: #1e8e3e;
        }

        .status-pending {
            background-color: #fef7e0;
            color: #f29c13;
        }

        .status-cancelled {
            background-color: #fce8e6;
            color: #d93025;
        }

        .loading-text {
            text-align: center;
            padding: 30px;
            color: #666;
            font-style: italic;
        }

        /* --- ENHANCED UI/UX STYLES --- */
        html {
            scroll-behavior: smooth;
        }

        .content-area {
            animation: fadeSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1) !important;
        }

        /* Sidebar & Micro Interactions */
        .sidebar-menu li a {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .sidebar-menu li a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: rgba(255, 255, 255, 0.1);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .sidebar-menu li a:hover::before,
        .sidebar-menu li a.active::before {
            width: 100%;
        }

        .sidebar-menu li a.active {
            border-left: 4px solid white;
            background: rgba(255, 255, 255, 0.1);
        }

        .user-profile {
            transition: transform 0.2s ease;
            display: flex;
            cursor: pointer;
        }

        .user-profile:hover {
            transform: scale(1.05);
        }

        /* Skeleton Loading */
        .skeleton-row td {
            position: relative;
            overflow: hidden;
        }

        .skeleton-box {
            height: 20px;
            background: #eee;
            border-radius: 4px;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        @keyframes skeleton-pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        /* Row Animation & Status Badges */
        .appointments-table tbody tr {
            animation: fadeInRow 0.5s ease-out forwards;
            opacity: 0;
        }

        .appointments-table tbody tr:nth-child(1) {
            animation-delay: 0.1s;
        }

        .appointments-table tbody tr:nth-child(2) {
            animation-delay: 0.2s;
        }

        .appointments-table tbody tr:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes fadeInRow {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .status-badge {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-block;
        }

        .status-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }

        /* Cancel Action */
        .btn-cancel {
            background: transparent;
            color: #d93025;
            border: 1px solid #d93025;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: inline-block;
        }

        .btn-cancel:hover {
            background: #d93025;
            color: #fff;
            box-shadow: 0 4px 10px rgba(217, 48, 37, 0.2);
            transform: translateY(-2px);
        }

        .row-removing {
            animation: fadeOutRow 0.4s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards !important;
        }

        @keyframes fadeOutRow {
            to {
                opacity: 0;
                transform: translateX(30px) scale(0.95);
            }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            max-width: 400px;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-btn {
            padding: 10px 20px;
            margin: 10px 5px 0;
            font-weight: 500;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-confirm {
            background: #d93025;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn-confirm:hover {
            background: #b8281f;
            transform: translateY(-2px);
        }

        .btn-dismiss {
            background: #eee;
            color: #333;
        }

        .btn-dismiss:hover {
            background: #ddd;
            transform: translateY(-2px);
        }

        /* Button Loading state */
        .btn-loading {
            color: transparent !important;
            pointer-events: none;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-top: -10px;
            margin-left: -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>MedicPulse</h2>
            </div>
            <ul class="sidebar-menu" id="sidebar-menu">
                <!-- Menu items will be injected based on page -->
            </ul>
        </div>

        <div class="main-wrapper">
            <nav class="navbar">
                <div class="nav-left">
                    <button class="sidebar-toggle" id="mobile-sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <span class="system-name">MedicPulse Hospital</span>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <span class="user-name" id="navUserName">...</span>
                        <div class="notification-icon">
                            <i class="fas fa-bell"></i>
                        </div>
                    </div>
                    <a href="login.html" class="logout-btn">Logout</a>
                </div>
            </nav>

            <main class="content-area">
                <div class="page-header">
                    <h1>Your Scheduled Appointments</h1>
                    <p>View and manage all your upcoming and past appointments.</p>
                </div>

                <div class="card appointments-card">
                    <table class="appointments-table" id="appointmentsTable">
                        <thead>
                            <tr>
                                <th>Doctor</th>
                                <th>Department</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentsList">
                            <tr class="skeleton-row">
                                <td>
                                    <div class="skeleton-box" style="width: 80%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 90%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 60%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 50%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 70%; border-radius: 20px;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 60px; border-radius: 20px;"></div>
                                </td>
                            </tr>
                            <tr class="skeleton-row">
                                <td>
                                    <div class="skeleton-box" style="width: 70%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 85%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 65%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 45%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 75%; border-radius: 20px;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 60px; border-radius: 20px;"></div>
                                </td>
                            </tr>
                            <tr class="skeleton-row">
                                <td>
                                    <div class="skeleton-box" style="width: 75%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 80%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 55%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 60%;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 65%; border-radius: 20px;"></div>
                                </td>
                                <td>
                                    <div class="skeleton-box" style="width: 60px; border-radius: 20px;"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="modal-overlay" id="cancelModal">
                    <div class="modal-content">
                        <h3 style="margin-bottom: 15px; color: #333;">Cancel Appointment?</h3>
                        <p style="color: #666; margin-bottom: 25px; font-size: 0.95rem;">Are you sure you want to cancel
                            this appointment? This action cannot be undone.</p>
                        <div style="display: flex; justify-content: center; gap: 15px;">
                            <button class="modal-btn btn-dismiss" onclick="closeModal()">Keep It</button>
                            <button class="modal-btn btn-confirm" onclick="confirmCancel()">Yes, Cancel</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script>
        // Cancel Modal UI Logic
        let currentAppointmentId = null;
        let currentRow = null;

        function openModal(btn, id) {
            currentAppointmentId = id;
            currentRow = btn.closest('tr');
            document.getElementById('cancelModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('cancelModal').classList.remove('active');
            currentAppointmentId = null;
            currentRow = null;
        }

        async function confirmCancel() {
            if (currentAppointmentId) {
                const confirmBtn = document.querySelector('.btn-confirm');
                confirmBtn.classList.add('btn-loading');

                const success = await cancelAppointment(currentAppointmentId);
                
                confirmBtn.classList.remove('btn-loading');
                if (success) {
                    closeModal();
                    if (currentRow) {
                        currentRow.classList.add('row-removing');
                        setTimeout(() => currentRow.remove(), 400);
                    }
                }
            }
        }
    </script>
</body>

</html>
