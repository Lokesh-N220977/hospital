<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedicPulse Hospital</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">
    <div class="auth-container">
        <!-- Left Side: Image & Branding -->
        <div class="auth-banner">
            <div class="auth-banner-content">
                <div class="auth-logo">
                    <i class="fas fa-notes-medical"></i> MedicPulse
                </div>
                <h2>Streamline Your Health Journey</h2>
                <p>Access your medical records, book appointments, and connect with top healthcare professionals
                    securely from anywhere.</p>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="login-card">
            <a href="../../index.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>

            <!-- Mobile Header (Hidden on Desktop) -->
            <div class="auth-header-mobile">
                <h2><i class="fas fa-notes-medical"></i> MedicPulse</h2>
                <p>Welcome Back</p>
            </div>

            <div class="login-form-area">
                <h1 class="form-title">Login</h1>
                <form id="loginForm">
                    <div class="input-group">
                        <label for="role">Login As</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user-shield"></i>
                            <select id="role" required>
                                <option value="patient">Patient</option>
                                <option value="doctor">Doctor</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">
                        Login <i class="fas fa-sign-in-alt"></i>
                    </button>
                </form>

                <div class="register-link">
                    Don't have an account? <a href="register.html">Register here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const roleSelect = document.getElementById('role');
        const registerLink = document.querySelector('.register-link');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        if (roleSelect && registerLink) {
            roleSelect.addEventListener('change', (e) => {
                if (e.target.value === 'admin' || e.target.value === 'doctor') {
                    registerLink.style.display = 'none';
                } else {
                    registerLink.style.display = 'block';
                }
            });
        }

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const role = roleSelect.value;

            if (email && password) {
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                submitBtn.disabled = true;

                // Simulate brief authentication delay
                setTimeout(() => {
                    console.log("Static Authentication successful, redirecting...");
                    
                    // Simple role-based redirect for static UI
                    if (role === 'admin') {
                        window.location.href = 'admin/dashboard.html';
                    } else if (role === 'doctor') {
                        window.location.href = 'doctor/dashboard.html';
                    } else {
                        window.location.href = 'patient_dashboard.html';
                    }
                }, 800);
            }
        });

        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        if (togglePassword) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye-slash');
            });
        }
    </script>
</body>

</html>
